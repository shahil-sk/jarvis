jarvis:
  name: Jarvis
  version: 0.1.0
  debug: false
  memory:
    max_entries: 50
    persist: true
    db_path: ~/.jarvis/memory.db   # all notes + history stored here
  plugins_dir: plugins

  # --- LLM MODE -------------------------------------------
  llm_mode: lmstudio

  llm_backends:
    openai:
      base_url: https://api.openai.com/v1
      api_key: ""
      model: gpt-4o-mini
      max_tokens: 512
      temperature: 0.7

    groq:
      base_url: https://api.groq.com/openai/v1
      api_key: ""
      model: llama-3.3-70b-versatile
      max_tokens: 512
      temperature: 0.7

    lmstudio:
      base_url: http://localhost:1234/v1
      api_key: lm-studio
      model: local-model
      max_tokens: 512
      temperature: 0.7

    ollama:
      base_url: http://localhost:11434/v1
      api_key: ollama
      model: mistral
      max_tokens: 512
      temperature: 0.7

    openrouter:
      base_url: https://openrouter.ai/api/v1
      api_key: ""
      model: mistralai/mistral-7b-instruct
      max_tokens: 512
      temperature: 0.7

  llm:
    system_prompt: >
      You are Jarvis, a fast and helpful AI assistant.
      Be concise. Avoid filler. Answer directly.
