jarvis:
  name: Jarvis
  version: 0.1.0
  debug: false
  memory:
    max_entries: 50
  plugins_dir: plugins
  llm:
    base_url: https://api.openai.com/v1  # swap to Groq/Ollama/LM Studio freely
    api_key: ""                           # or set JARVIS_LLM_API_KEY env var
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0.7
    system_prompt: >
      You are Jarvis, a fast and helpful AI assistant.
      Be concise. Avoid filler. Answer directly.
