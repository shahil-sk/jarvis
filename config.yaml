jarvis:
  name: Jarvis
  debug: false

  # LLM routing: true = LLM classifies every input (recommended)
  #              false = keyword-fallback only (no LLM needed)
  llm_routing: true

  llm_mode: lmstudio   # switch to 'openai' or 'anthropic' as needed

  llm:
    system_prompt: "You are Jarvis, a concise AI assistant. Answer briefly and clearly."

  llm_backends:
    lmstudio:
      base_url: "http://localhost:1234/v1"
      api_key: sk-lm-41cuhi2W:ZSg1R5dsjO6qQRPaEPrn    # LM Studio ignores this but needs a non-empty value
      model: liquid/lfm2.5-1.2b
    openai:
      base_url: "https://api.openai.com/v1"
      api_key: "sk-YOUR_OPENAI_KEY"
      model: "gpt-4o-mini"
    anthropic:
      base_url: "https://api.anthropic.com/v1"
      api_key: "YOUR_ANTHROPIC_KEY"
      model: "claude-3-haiku-20240307"

  memory:
    persist: true
    db_path: "~/.jarvis/memory.db"
    max_entries: 50

  # -----------------------------------------------------------------------
  # App Launcher
  # -----------------------------------------------------------------------
  # Map short names to real executables or paths.
  # These override the built-in defaults in the launcher plugin.
  app_aliases:
    vscode: code
    browser: google-chrome
    term: gnome-terminal
    editor: nvim
    notes: obsidian
    files: nautilus
    calc: gnome-calculator

  # -----------------------------------------------------------------------
  # Workspaces
  # -----------------------------------------------------------------------
  # Each workspace is a named list of apps / URLs / paths to open together.
  # Say: "open my dev workspace" or "open workspace work"
  workspaces:
    dev:
      - code
      - https://github.com
      - gnome-terminal
    work:
      - chrome
      - https://mail.google.com
      - slack
    media:
      - spotify
      - vlc

  # -----------------------------------------------------------------------
  # GitHub plugin (optional)
  # -----------------------------------------------------------------------
  github:
    token: ""   # set JARVIS_GITHUB_TOKEN env var instead of hardcoding
